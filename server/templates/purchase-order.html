<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: Arial, Helvetica, sans-serif; color: #1e293b; font-size: 13px; }
      .head { display: flex; justify-content: space-between; align-items: flex-start; }
      h1 { font-size: 22px; margin: 0; }
      .muted { color: #64748b; }
      table { width: 100%; border-collapse: collapse; margin-top: 24px; }
      th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #e2e8f0; }
      th { background: #f8fafc; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
      .right { text-align: right; }
      .total { font-size: 16px; font-weight: bold; }
    </style>
  </head>
  <body>
    <div class="head">
      <div>
        <h1>{{companyName}}</h1>
        <div class="muted">{{companyAddress}}</div>
      </div>
      <div class="right">
        <h1>PURCHASE ORDER</h1>
        <div class="muted">{{poId}}</div>
        <div class="muted">Created: {{created}}</div>
        <div class="muted">Delivery: {{delivery}}</div>
      </div>
    </div>

    <p style="margin-top:24px"><strong>Vendor:</strong> {{vendor}}</p>

    <table>
      <thead>
        <tr><th>Item</th><th class="right">Qty</th><th class="right">Unit price</th><th class="right">Amount</th></tr>
      </thead>
      <tbody>
        {{#each items}}
        <tr><td>{{name}}</td><td class="right">{{qty}}</td><td class="right">{{unitPrice}}</td><td class="right">{{lineTotal}}</td></tr>
        {{/each}}
      </tbody>
    </table>

    <p class="right total" style="margin-top:18px">Total: {{amount}}</p>
  </body>
</html>
